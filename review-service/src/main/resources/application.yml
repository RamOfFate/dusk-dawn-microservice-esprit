spring:
  application:
    name: review-service
  datasource:
    url: jdbc:mysql://localhost:3306/bookstore_reviews?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak expose ici la clé publique pour vérifier les tokens
          issuer-uri: http://localhost:8180/realms/bookstore

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false
    home-page-url: http://localhost:4200/
    status-page-url: http://localhost:4200/

review:
  security:
    dev-header-auth: true
  jwt:
    secret: ${REVIEW_JWT_SECRET:changeme-please-use-at-least-256-bits-for-hs256-secret-key-in-production-bookstore}
    expiration-ms: 86400000
  cors:
    allowed-origins:
      - http://localhost:4200
