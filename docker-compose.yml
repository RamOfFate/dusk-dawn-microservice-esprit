services:
  eureka-server:
    build:
      context: ./eureka-server
    image: bookshop/eureka-server:local
    container_name: eureka-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "8761:8761"
    restart: unless-stopped

  bookshop-config-server:
    build:
      context: ./bookshop-config-server
    image: bookshop/config-server:local
    container_name: bookshop-config-server
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "8888:8888"
    restart: unless-stopped

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_USER=ram
      - MYSQL_PASSWORD=password123
      - MYSQL_DATABASE=users_db
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpass",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  postgres-db:
    image: postgres:16
    container_name: postgres-db
    environment:
      - POSTGRES_DB=job_ms
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongo-db:
    image: mongo:7
    container_name: mongo-db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  keycloak-db:
    image: postgres:16
    container_name: keycloak-db
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.1
    container_name: keycloak
    depends_on:
      keycloak-db:
        condition: service_healthy
    command: ["start-dev", "--http-port=8081", "--import-realm"]
    environment:
      - KC_DB=postgres
      - KC_DB_URL_HOST=keycloak-db
      - KC_DB_URL_DATABASE=keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KC_HEALTH_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8081:8081"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    restart: unless-stopped

  recommendation-search-service:
    build:
      context: ./recommendation-search-service
    image: bookshop/recommendation-search-service:local
    container_name: recommendation-search-service
    depends_on:
      mongo-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - PORT=8083
      - MONGODB_URI=mongodb://mongo-db:27017/recommendation_search
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8761
      - EUREKA_SERVICE_NAME=recommendation-search-service
    ports:
      - "8083:8083"
    restart: unless-stopped

  bookshop-service:
    build:
      context: ./springboot-bookshop
    image: bookshop/bookshop-service:local
    container_name: bookshop-service
    depends_on:
      eureka-server:
        condition: service_healthy
      bookshop-config-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://bookshop-config-server:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"
    volumes:
      - bookshop_h2:/Database
    restart: unless-stopped

  usermicroservice:
    build:
      context: ./microservice
    image: bookshop/usermicroservice:local
    container_name: usermicroservice
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      bookshop-config-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://bookshop-config-server:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/users_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpass
    ports:
      - "8095:8095"
    restart: unless-stopped

  candidat-service:
    build:
      context: ./ms
    image: bookshop/candidat-service:local
    container_name: candidat-service
    depends_on:
      postgres-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      bookshop-config-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://bookshop-config-server:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/job_ms
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root
    ports:
      - "8089:8089"
    restart: unless-stopped

  cartmanagement:
    build:
      context: ./CartsManagement
    image: bookshop/cartmanagement:local
    container_name: cartmanagement
    depends_on:
      eureka-server:
        condition: service_healthy
      bookshop-config-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://bookshop-config-server:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    ports:
      - "8084:8084"
    volumes:
      - cart_h2:/Database
    restart: unless-stopped

  review-service:
    build:
      context: ./review-service
    image: bookshop/review-service:local
    container_name: review-service
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      bookshop-config-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://bookshop-config-server:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/bookstore_reviews?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=utf8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpass
    ports:
      - "8082:8082"
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
    image: bookshop/api-gateway:local
    container_name: api-gateway
    depends_on:
      eureka-server:
        condition: service_healthy
      bookshop-config-server:
        condition: service_healthy
      bookshop-service:
        condition: service_started
      usermicroservice:
        condition: service_started
      candidat-service:
        condition: service_started
      cartmanagement:
        condition: service_started
      review-service:
        condition: service_started
      recommendation-search-service:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      - CONFIG_SERVER_URL=http://bookshop-config-server:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=http://keycloak:8081/realms/bookshop
      - KEYCLOAK_JWKS_URI=http://keycloak:8081/realms/bookshop/protocol/openid-connect/certs
    ports:
      - "8060:8060"
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data:
  mongo_data:
  keycloak_db_data:
  bookshop_h2:
  cart_h2:
