server.port=8095

spring.datasource.url=jdbc:mysql://localhost:3306/users_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=ram
spring.datasource.password=password123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# --- Keycloak Admin sync ---
# usermicroservice syncs Keycloak realm users into its local MySQL table for the admin dashboard.
# Defaults are Docker-friendly; override via env vars on the usermicroservice container.
keycloak.admin.base-url=${KEYCLOAK_URL:http://keycloak:8081}
keycloak.admin.auth-realm=${KEYCLOAK_ADMIN_AUTH_REALM:master}
keycloak.admin.target-realm=${KEYCLOAK_REALM:bookshop}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
