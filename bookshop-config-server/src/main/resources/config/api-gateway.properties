server.port=8060

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.prefer-ip-address=true

spring.cloud.gateway.mvc.routes[0].id=bookshop-service
spring.cloud.gateway.mvc.routes[0].uri=lb://BOOKSHOP-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[0].predicates[0].args[pattern]=/api/**

spring.cloud.gateway.mvc.routes[1].id=user-service
spring.cloud.gateway.mvc.routes[1].uri=lb://usermicroservice
spring.cloud.gateway.mvc.routes[1].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[1].predicates[0].args[pattern]=/users/**

spring.cloud.gateway.mvc.routes[2].id=candidat-service
spring.cloud.gateway.mvc.routes[2].uri=lb://Candidat4TWIN2Ms
spring.cloud.gateway.mvc.routes[2].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[2].predicates[0].args[pattern]=/candidats/**

spring.cloud.gateway.mvc.routes[3].id=cart-management
spring.cloud.gateway.mvc.routes[3].uri=lb://CartManagement
spring.cloud.gateway.mvc.routes[3].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[3].predicates[0].args[pattern]=/carts/**

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
