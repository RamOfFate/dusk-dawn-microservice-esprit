server.port=8060

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

eureka.instance.prefer-ip-address=true

# --- Keycloak (OIDC) ---
# NOTE: We configure only the JWK Set URL to avoid issuer mismatches between
# browser-accessed Keycloak (http://localhost:8081) and Docker network Keycloak (http://keycloak:8081).
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://keycloak:8081/realms/bookshop/protocol/openid-connect/certs}

spring.cloud.gateway.mvc.routes[0].id=bookshop-service
spring.cloud.gateway.mvc.routes[0].uri=lb://BOOKSHOP-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[0].predicates[0].args[pattern]=/api/**

