server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/bookstore_reviews?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/bookstore

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.home-page-url=http://localhost:4200/
eureka.instance.status-page-url=http://localhost:4200/

review.security.dev-header-auth=true
review.jwt.secret=${REVIEW_JWT_SECRET:changeme-please-use-at-least-256-bits-for-hs256-secret-key-in-production-bookstore}
review.jwt.expiration-ms=86400000
review.cors.allowed-origins[0]=http://localhost:4200
